name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node 20.x
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            client/package-lock.json

      - name: Install client dependencies
        run: |
          cd client
          npm ci

      - name: Lint client
        run: cd client && npm run lint

      - name: Test client
        run: npm run test:client